<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maciej's Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#f0eeeb;
  --text:#1a1a1a;
  --accent:#2a2a2a;
  --line:#b0aba3;
  --gap:28px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
}

/* HEADER */
header{
  padding:72px 60px 56px;
  display:flex;
  align-items:center;
  gap:28px;
}
.header-line{flex:1;height:1px;background:var(--line);}
header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,4vw,3.2rem);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  padding-bottom:60px;
}
nav a{
  text-decoration:none;
  color:var(--line);
  text-transform:uppercase;
  letter-spacing:.15em;
}
nav a:hover{color:var(--accent);}

/* GRID */
main{
  max-width:1180px;
  margin:auto;
  padding:0 48px 120px;
}

.grid-row{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:var(--gap);
  margin-bottom:var(--gap);
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  background:#ddd;
  border:1px solid #c5c1bb;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:14px;

  cursor:pointer;

  transition:transform .35s ease, box-shadow .35s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 30px 60px rgba(0,0,0,.2);
}

/* IMAGE (fix für Hoch + Querformat) */
.card img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
  display:block;
}

/* VARIANTS */
.card.landscape{grid-column:span 5;}
.card.portrait{grid-column:span 3;}
.card.square{grid-column:span 3;}
.card.wide{grid-column:span 6;}

/* NUMBER */
.card-number{
  position:absolute;
  top:10px;
  right:10px;
  font-size:.8rem;
  color:#999;
  z-index:2;
}

/* LABEL */
.card-wrap{
  display:flex;
  flex-direction:column;
}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;
  justify-content:center;
}
#lightbox.open{display:flex;}

#lightbox-card img{
  max-width:90vw;
  max-height:85vh;
  object-fit:contain;
}

#lightbox-close{
  position:absolute;
  top:-40px;
  right:0;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="header-line"></div>
<h1>Maciej's Portfolio</h1>
<div class="header-line"></div>
</header>

<nav>
<a href="photos.html">Photography</a>
<a href="designs.html">Design</a>
</nav>

<main>

<!-- ROW 1 -->
<div class="grid-row">

  <div class="card-wrap">
    <div class="card landscape">
      <span class="card-number">01</span>
      <img src="images/img1.jpg">
    </div>
  </div>

  <div class="card-wrap">
    <div class="card portrait">
      <span class="card-number">02</span>
      <img src="images/img2.jpg">
    </div>
  </div>

  <div class="card-wrap">
    <div class="card square">
      <span class="card-number">03</span>
      <img src="images/img3.jpg">
    </div>
  </div>

</div>

<!-- ROW 2 -->
<div class="grid-row">

  <div class="card-wrap">
    <div class="card wide">
      <span class="card-number">04</span>
      <img src="images/img4.jpg">
    </div>
  </div>

  <div class="card-wrap">
    <div class="card portrait">
      <span class="card-number">05</span>
      <img src="images/img5.jpg">
    </div>
  </div>

  <div class="card-wrap">
    <div class="card landscape">
      <span class="card-number">06</span>
      <img src="images/img6.jpg">
    </div>
  </div>

</div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lightbox-card">
    <button id="lightbox-close">Close</button>
    <img id="lb-img">
  </div>
</div>

<script>
const lightbox=document.getElementById("lightbox");
const lbImg=document.getElementById("lb-img");

document.querySelectorAll(".card img").forEach(img=>{
  img.addEventListener("click",()=>{
    lbImg.src=img.src;
    lightbox.classList.add("open");
  });
});

lightbox.addEventListener("click",(e)=>{
  if(e.target===lightbox){
    lightbox.classList.remove("open");
  }
});
</script>

</body>
</html>
