<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maciej's Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0eeeb;
      --text: #1a1a1a;
      --accent: #2a2a2a;
      --line: #b0aba3;
      --placeholder-bg: #e0ddd9;
      --placeholder-border: #c5c1bb;
      --gap: 28px;
      --col: calc((100% - 2 * var(--gap)) / 3);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 72px 60px 56px;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .header-line {
      flex: 1;
      height: 1.5px;
      background: var(--line);
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0.01em;
      white-space: nowrap;
      color: var(--accent);
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding-bottom: 60px;
    }

    nav a {
      text-decoration: none;
      color: var(--line);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    nav a:hover { color: var(--accent); }

    /* ── GRID ── */
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    /* ── CARD ── */
    .card {
      position: relative;
      overflow: hidden;
      background: var(--placeholder-bg);
      border: 1px solid var(--placeholder-border);
      aspect-ratio: 3 / 2;
      cursor: pointer;
      transition: transform 0.38s cubic-bezier(.22,.68,0,1.2),
                  box-shadow 0.38s ease;
    }

    .card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.18);
      box-shadow: 0 40px 80px rgba(0,0,0,0.22);
      z-index: 10;
    }

    /* subtle noise texture */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      z-index: 2;
      pointer-events: none;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .card-inner { opacity: 1; }

    .card-label {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .card-number {
      position: absolute;
      top: 18px;
      right: 20px;
      z-index: 3;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      color: var(--placeholder-border);
      letter-spacing: 0.04em;
    }

    .card-wrap {
      display: flex;
      flex-direction: column;
    }

    /* different tones per row for visual rhythm */
    .row-1 .card { background: #dedad5; }
    .row-2 .card { background: #e4e1dc; }
    .row-3 .card { background: #d8d5d0; }
    .row-4 .card { background: #e8e5e1; }
    .row-5 .card { background: #dbd8d3; }
    .row-6 .card { background: #e2dfda; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--line);
      border-top: 1px solid var(--placeholder-border);
    }

    /* ── FADE IN on load ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header {
      animation: fadeUp 0.7s ease both;
    }

    .grid-row {
      animation: fadeUp 0.6s ease both;
    }
    .grid-row:nth-child(1) { animation-delay: 0.1s; }
    .grid-row:nth-child(2) { animation-delay: 0.18s; }
    .grid-row:nth-child(3) { animation-delay: 0.26s; }
    .grid-row:nth-child(4) { animation-delay: 0.34s; }
    .grid-row:nth-child(5) { animation-delay: 0.42s; }
    .grid-row:nth-child(6) { animation-delay: 0.50s; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 14, 13, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #lightbox.open {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #lightbox-card {
      position: relative;
      cursor: default;
      animation: popIn 0.3s cubic-bezier(.22,.68,0,1.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lightbox-card img.lb-img {
      display: block;
      max-width: 92vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    @keyframes popIn {
      from { transform: scale(0.82); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: rgba(255,255,255,0.55);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      border: none;
      background: none;
      transition: color 0.2s;
    }

    #lightbox-close:hover { color: #fff; }

    #lightbox-number {
      position: absolute;
      top: 18px;
      right: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    #lightbox-label {
      position: absolute;
      bottom: 18px;
      left: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header {
        padding: 40px 24px 32px;
        gap: 16px;
      }

      header h1 {
        font-size: clamp(1.4rem, 6vw, 2rem);
      }

      main {
        padding: 0 16px 80px;
      }

      .grid-row {
        grid-template-columns: 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .card { aspect-ratio: 3 / 2; }

      .card:hover {
        transform: none;
        box-shadow: none;
      }

      #lightbox-card {
        width: 94vw;
        height: auto;
        max-height: 85vh;
      }

      footer {
        padding: 28px 16px;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>

  <!-- Lightbox -->
  <div id="lightbox">
    <div id="lightbox-card">
      <button id="lightbox-close">Close</button>
      <span id="lightbox-number"></span>
      <span id="lightbox-label"></span>
    </div>
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lbCard   = document.getElementById('lightbox-card');
    const lbNumber = document.getElementById('lightbox-number');
    const lbLabel  = document.getElementById('lightbox-label');
    const lbClose  = document.getElementById('lightbox-close');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const num   = card.querySelector('.card-number').textContent;
        const label = card.querySelector('.card-label').textContent;
        const bg    = getComputedStyle(card).backgroundColor;

        lbCard.style.background = bg;
        // If card has an image, show it full size
        const img = card.querySelector('img');
        const existingImg = lbCard.querySelector('img.lb-img');
        if (existingImg) existingImg.remove();
        if (img) {
          const full = document.createElement('img');
          full.src = img.src;
          full.className = 'lb-img';
          lbCard.appendChild(full);
          lbCard.style.background = 'none';
        } else {
          lbCard.style.background = bg;
        }
        lbNumber.textContent = num;
        lbLabel.textContent  = label;

        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    lbClose.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
