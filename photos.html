<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maciej's Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0eeeb;
      --text: #1a1a1a;
      --accent: #2a2a2a;
      --line: #b0aba3;
      --placeholder-bg: #e0ddd9;
      --placeholder-border: #c5c1bb;
      --gap: 28px;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* HEADER */
    header {
      padding: 72px 60px 56px;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .header-line {
      flex: 1;
      height: 1.5px;
      background: var(--line);
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3.2rem);
      white-space: nowrap;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding-bottom: 60px;
    }

    nav a {
      text-decoration: none;
      color: var(--line);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    nav a:hover {
      color: var(--accent);
    }

    /* GRID */
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      align-items: start;
      margin-bottom: var(--gap);
    }

    /* CARD */
    .card {
      position: relative;
      overflow: hidden;
      background: var(--placeholder-bg);
      border: 1px solid var(--placeholder-border);

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 12px;

      min-height: 240px;

      cursor: pointer;

      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: transform 0.35s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-number {
      position: absolute;
      top: 14px;
      right: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      color: var(--placeholder-border);
    }

    .card-label {
      text-align: center;
      margin-top: 10px;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
    }

    .card-wrap {
      display: flex;
      flex-direction: column;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.72rem;
      color: var(--line);
    }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lightbox-card img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .grid-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-line"></div>
  <h1>Maciej's Portfolio</h1>
  <div class="header-line"></div>
</header>

<nav>
  <a href="photos.html">Photography</a>
  <a href="designs.html">Design</a>
</nav>

<main>

  <!-- ROWS -->
  <div class="grid-row">
    <div class="card-wrap">
      <div class="card"><span class="card-number">01</span><img src="pictures/Lovebuzz alte Fleischerei (46 of 64).jpg"></div>
      <div class="card-label">Untitled</div>
    </div>

    <div class="card-wrap">
      <div class="card"><span class="card-number">02</span><img src="pictures/Lovebuzz alte Fleischerei (49 of 64).jpg"></div>
      <div class="card-label">Untitled</div>
    </div>

    <div class="card-wrap">
      <div class="card"><span class="card-number">03</span><img src="pictures/Lovebuzz alte Fleischerei (60 of 64).jpg"></div>
      <div class="card-label">Untitled</div>
    </div>
  </div>

</main>

<footer>© 2026 Maciej</footer>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lightbox-card">
    <button id="lightbox-close">Close</button>
    <img id="lightbox-img" />
  </div>
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const closeBtn = document.getElementById('lightbox-close');

  document.querySelectorAll('.card img').forEach(img => {
    img.addEventListener('click', () => {
      lbImg.src = img.src;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  closeBtn.addEventListener('click', closeLightbox);
</script>

</body>
</html>
